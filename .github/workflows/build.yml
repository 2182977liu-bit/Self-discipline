name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-arm64
          path: app/build/outputs/apk/debug/*.apk

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          if [ -f app/build/outputs/apk/debug/*.apk ]; then
            echo "✅ Build successful! APK artifact is available for download." >> $GITHUB_STEP_SUMMARY
            ls -lh app/build/outputs/apk/debug/*.apk >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build failed. Check the build logs for details." >> $GITHUB_STEP_SUMMARY
          fi
